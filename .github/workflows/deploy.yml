name: Deploy to home server

# Push to main → rsync into ~/task-app on the box → rebuild + restart the
# web container. Runs on the self-hosted runner that lives on the box
# itself, so no SSH or secrets are needed — the runner has local access
# to the deploy dir and the docker socket.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  # Let in-flight builds finish — cancelling mid-build can leave a half-pulled
  # image on disk and a degraded compose state.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Sync source to ~/task-app
        # rsync from the runner's checkout into the real deploy dir. The
        # excludes preserve the prod .env (which lives only on the box) and
        # the build artifacts (regenerated by `docker compose build`).
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.env*.local' \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='actions-runner/' \
            "${{ github.workspace }}/" /home/avinh/task-app/

      - name: Build + restart web
        working-directory: /home/avinh/task-app
        run: docker compose up -d --build web

      - name: Smoke test
        working-directory: /home/avinh/task-app
        run: |
          # Give the container a few seconds to bind the port, then make
          # sure it responds. The web service redirects unauthenticated
          # requests to /login, so a 200 or 307 from / both mean "alive."
          sleep 5
          docker compose ps web
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 8 http://localhost:3002/)
          echo "status: $code"
          case "$code" in 200|307) echo "ok"; exit 0 ;; *) echo "unexpected"; exit 1 ;; esac
